<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sixx Authentics Certificate Lookup</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }
    .container {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    .logo {
      max-width: 250px;
      margin-bottom: 30px;
    }
    .input-wrapper {
      max-width: 400px;
      width: 100%;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      font-size: 18px;
      border-radius: 4px;
      border: 1px solid #555;
      box-sizing: border-box;
      text-transform: uppercase;
    }
    button {
      margin-top: 12px;
      padding: 10px 24px;
      font-size: 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      background: #e91e63;
      color: #fff;
    }
    button:hover {
      background: #c2185b;
    }
    .hint {
      margin-top: 8px;
      font-size: 13px;
      color: #bbb;
    }
    .error {
      margin-top: 8px;
      font-size: 13px;
      color: #ff8080;
      display: none;
    }
  </style>
  <script>
    function goToCertificate(event) {
      event.preventDefault(); // stop normal form submit

      const input = document.getElementById('cid-input');
      let value = input.value.trim();

      if (!value) {
        showError('Please enter a certificate ID.');
        return;
      }

      // normalize: remove spaces, force lowercase for filename
      value = value.replace(/\s+/g, '');
      const filename = value.toLowerCase() + '.html';

      // if this file is in /certificates/, we redirect within that folder
      // e.g. /certificates/cid00000023.html
      window.location.href = filename;
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</head>
<body>
  <div class="container">
    <img src="YOUR_LOGO_URL_HERE" alt="Sixx Authentics" class="logo">
    <div class="input-wrapper">
      <form onsubmit="goToCertificate(event);">
        <input
          type="text"
          id="cid-input"
          placeholder="Enter Certificate ID (e.g. CID00000023)"
          autocomplete="off"
        >
        <button type="submit">Verify Certificate</button>
        <div class="hint">Enter the exact ID printed on your label.</div>
        <div id="error-msg" class="error"></div>
      </form>
    </div>
  </div>
</body>
</html>
